<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Budget Tracker - Part 4</title>
  </head>

  <body>
    <h1>Budget Tracker</h1>
    <div class="container">
      <form id="budget-form">
        <input type="text" id="description" placeholder="description" />
        <input type="number" step="1" id="amount" placeholder="amount" />
        <!-- Create description and amount input here. The id of description input should be "description" and Amount should be "amount". -->
        <label for="type">Type</label>
        <select id="type">
          <option value="income">income</option>
          <option value="expense">expense</option>
          <!-- Create income and expense options here, value of Income should be "income" and Expense should be "expense"-->
        </select>
        <button type="submit">add</button>
        <!-- Add a button here that will add income and expense, should have type "submit". -->
      </form>
      <div id="budget-display">
        <p id="total-budget"></p>
        <!-- Display the budget here after adding expense or income. The id of the budget should be "total-budget". -->
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>

    <title>Attendance Sheet</title>

  <body>
    <div class="tableContainer">
      <table>
        <caption>
          Student's Attendance Sheet
        </caption>
        <thead id="tHead"></thead>
        <tbody id="tBody"></tbody>
      </table>
    </div>

    <section>
      <div class="container">
        <label for="searchInput">Search Student</label>
        <input
          type="text"
          type="text"
          id="searchInput"
          placeholder="Enter name or rollNo..."
        />
      </div>

      <button id="btn" onclick="findStudent()">Search</button>
      <!-- define button here -->
    </section>

    <div class="result">
      <table>
        <caption>
          Student Details
        </caption>
        <thead>
          <tr>

            <th>Attendance (%)</th>
          </tr>
        </thead>
        <tbody id="resultTBody"></tbody>
      </table>
    </div>

<!doctype html>
<html lang="en">
  <head>
    <script
      src="https://kit.fontawesome.com/b3348ae33f.js"
      crossorigin="anonymous"
    ></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Luck Game</title>
  </head>

  <body>
    <h1>Multi-Dice Race Game</h1>
    <div class="playerIdentity">
      <p class="playerTurn">
        <i class="fa-solid fa-person"></i>
        <span>Human</span>
      </p>
      <p>
        <i class="fa-solid fa-user"></i>
        <span>Computer</span>
      </p>
    </div>
    <div class="gameBoard">
      <div class="relativePosition">
        <span class="labelled">start</span>

        <div class="box" data-index="0">
          <i class="fa-solid fa-user" id="human-player"></i>
          <i class="fa-solid fa-person" id="computer-player"></i>
        </div>
      </div>

      <div class="box" data-index="1"></div>
      <div class="box" data-index="2"></div>
      <div class="box" data-index="3"></div>
      <div class="box" data-index="4"></div>
      <div class="box" data-index="5"></div>
      <div class="box" data-index="6"></div>
      <div class="box" data-index="7"></div>
      <div class="box" data-index="8"></div>
      <div class="box" data-index="9"></div>
      <div class="box" data-index="10"></div>
      <div class="box" data-index="11"></div>

      <div class="relativePosition">
        <span class="labelled">end</span>

        <div class="box" data-index="12"></div>
      </div>
    </div>

    <div class="allDiceContainer">
      <div class="diceContainer">
        <div class="dice">
          <i class="fa-solid fa-dice"></i>
        </div>
        <h5>Dice</h5>
      </div>
    </div>

    <div class="gameInfo">
      <div>
        <label for="diceCount">Enter No of dices you want to play with.</label>
        <input
          type="number"
          min="1"
          max="3"
          required
          title="Number of dice to play with"
          placeholder="1-3"
          onchange="diceCount(event)"
          id="diceCount"
        />
      </div>
      <p>Total Points : <span id="totalPoints">0</span></p>
      <h3 id=""></h3>
    </div>

    <div class="allBtns">
      <button class="rollBtn" onclick="rollDice()">Roll Dice</button>
      <button class="resetBtn" onclick="resetGame()">Reset Game</button>
    </div>
  </body>
</html>

      <button id="saveForm">saveForm</button>
      <!-- Create your buttons here -->

    <div id="formsContainer"></div>
  </body>
